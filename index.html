<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>VECTOR · MASTER · GEO‑UNIVERSE</title>

<style>
    body { background:#000; color:#fff; font-family:monospace; }
    .ascii { white-space:pre; color:#0f0; font-size:16px; }
</style>
</head>

<body>

<h1>VECTOR · MASTER · GEO‑UNIVERSE</h1>

<div id="ascii-output" class="ascii"></div>

<script src="GEO4D.js"></script>
<script src="GEO5D.js"></script>
<script src="GEOUniverse.js"></script>
<script src="GEOID.js"></script>

<script>
let f = 0;
setInterval(()=>{
    f++;

    document.getElementById("ascii-output").innerText = `
${GEO4D(f)}

${GEO5D(f)}

${GEOUniverse(f)}

${GEOID("neutral", f)}
`;
}, 120);
</script>

</body>
</html>
